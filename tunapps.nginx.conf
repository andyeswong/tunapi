server {
    listen 80;
    listen [::]:80;
    server_name *.tunapps.example.com tunapps.example.com;

    location ~ /.well-known/acme-challenge {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr:$remote_port;
        proxy_pass http://127.0.0.1:9180;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr:$remote_port;
        proxy_set_header X-Forwarded-Proto http;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://127.0.0.1:8443;

        # Optional response rewriting example (replace internal host with public host)
        sub_filter_once off;
        sub_filter_types text/html application/json;
        sub_filter 'http://127.0.0.1:8080' 'http://$host';
        sub_filter 'https://127.0.0.1:8080' 'https://$host';
    }
}
